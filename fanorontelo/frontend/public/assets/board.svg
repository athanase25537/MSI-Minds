<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Fond -->
  <rect width="400" height="400" fill="#f5f5f5"/>
  
  <!-- Grille 3x3 -->
  <line x1="66.67" y1="0" x2="66.67" y2="400" stroke="#333" stroke-width="3"/>
  <line x1="200" y1="0" x2="200" y2="400" stroke="#333" stroke-width="3"/>
  <line x1="333.33" y1="0" x2="333.33" y2="400" stroke="#333" stroke-width="3"/>
  
  <line x1="0" y1="66.67" x2="400" y2="66.67" stroke="#333" stroke-width="3"/>
  <line x1="0" y1="200" x2="400" y2="200" stroke="#333" stroke-width="3"/>
  <line x1="0" y1="333.33" x2="400" y2="333.33" stroke="#333" stroke-width="3"/>
  
  <!-- Diagonales -->
  <line x1="0" y1="0" x2="400" y2="400" stroke="#333" stroke-width="3"/>
  <line x1="400" y1="0" x2="0" y2="400" stroke="#333" stroke-width="3"/>
  
  <!-- Intersections (points) -->
  <circle cx="66.67" cy="66.67" r="8" fill="#333"/>
  <circle cx="200" cy="66.67" r="8" fill="#333"/>
  <circle cx="333.33" cy="66.67" r="8" fill="#333"/>
  
  <circle cx="66.67" cy="200" r="8" fill="#333"/>
  <circle cx="200" cy="200" r="8" fill="#333"/>
  <circle cx="333.33" cy="200" r="8" fill="#333"/>
  
  <circle cx="66.67" cy="333.33" r="8" fill="#333"/>
  <circle cx="200" cy="333.33" r="8" fill="#333"/>
  <circle cx="333.33" cy="333.33" r="8" fill="#333"/>
</svg>